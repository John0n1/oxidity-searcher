name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  rust-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Compile (locked)
        run: cargo check --workspace --all-targets --locked

      - name: README count drift check
        run: python3 scripts/sync_readme_counts.py --check

  rust-test:
    runs-on: ubuntu-latest
    needs: rust-check
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --locked --all-targets --all-features

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: oxidity.io/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: oxidity.io

      - name: Frontend lint
        run: npm run lint
        working-directory: oxidity.io

      - name: Frontend build
        run: npm run build
        working-directory: oxidity.io

  deploy-config:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nginx
        run: sudo apt-get update && sudo apt-get install -y nginx

      - name: Verify cloudflared unit
        run: ./scripts/verify_cloudflared_unit.sh

      - name: Test nginx ingress policy
        run: ./scripts/test_nginx_ingress.py

  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run Foundry tests
        run: forge test

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Dependency audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  smoke:
    runs-on: ubuntu-latest
    needs:
      - rust-test
      - frontend
      - deploy-config
      - contracts
      - audit
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Runtime smoke (planner + bounded discovery path)
        run: |
          cargo test --workspace --locked planner_returns_deterministic_best_plan -- --exact
          cargo test --workspace --locked dynamic_profit_floor_scales_up -- --exact
