worker_processes 1;
pid /tmp/oxidity-searcher-nginx.pid;
error_log /tmp/oxidity-searcher-nginx-error.log notice;

events {
    worker_connections 128;
}

http {
    access_log /tmp/oxidity-searcher-nginx-access.log;
    default_type application/octet-stream;
    sendfile on;
    server_tokens off;
    limit_req_status 429;

    limit_req_zone $binary_remote_addr zone=rpc_per_ip:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=summary_per_ip:10m rate=10r/s;

    include generated/mitander.dev.conf;
}
