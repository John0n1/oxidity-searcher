[advisories]
version = 2
# Ignore advisories for unmaintained/unfixable transitive dependencies
ignore = [
    # Marvin Attack timing side-channel in `rsa`; no fixed version available upstream
    "RUSTSEC-2023-0071",
    # `paste` is unmaintained; used transitively, no replacement available in dep tree
    "RUSTSEC-2024-0436",
    # `proc-macro-error2` is unmaintained; used transitively
    "RUSTSEC-2026-0173",
    # `rand` unsound with custom logger; used transitively, not a concern for this binary
    "RUSTSEC-2026-0097",
    # `derivative` is unmaintained; used transitively
    "RUSTSEC-2024-0388",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "0BSD",
    "CC0-1.0",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
    "MIT-0",
    "CDLA-Permissive-2.0",
    "LGPL-2.1-or-later",
]
# Allow dual/compound licenses that combine any of the above
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
